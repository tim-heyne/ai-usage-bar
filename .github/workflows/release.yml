name: Release DMG

# Trigger: läuft, sobald ein Tag wie v1.2.3 gepusht wird.
on:
  push:
    tags:
      - "v*"

# Minimale Rechte (Least Privilege): nur Release/Tags schreiben dürfen.
permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-latest          # Cloud-Mac mit Xcode/swiftc/codesign/hdiutil
    steps:
      - name: Code auschecken
        # Auf Commit-SHA gepinnt (Lieferketten-Sicherheit); Kommentar = lesbare Version
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Version aus Tag ableiten
        # Tag "v1.0.1" -> VERSION "1.0.1" (führendes v entfernen)
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: DMG bauen
        run: ./release-dmg.sh       # nutzt VERSION aus der Umgebung

      - name: Release erstellen + DMG anhängen
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # von GitHub automatisch bereitgestellt
        run: |
          gh release create "${GITHUB_REF_NAME}" "dist/AIUsageBar.dmg" \
            --title "AI Usage Bar ${GITHUB_REF_NAME}" \
            --generate-notes
